<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>互動學習網頁</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Noto+Sans+TC:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #FF7EB9;      /* 粉紅 */
            --secondary: #70D6FF;    /* 天藍 */
            --bg-color: #E8F9FF;
            --text-dark: #4A4A4A;
        }

        body {
            margin: 0;
            font-family: 'Fredoka One', 'Noto Sans TC', sans-serif;
            background-color: var(--bg-color);
            background-image: radial-gradient(#fff 15%, transparent 16%), radial-gradient(#fff 15%, transparent 16%);
            background-size: 60px 60px;
            background-position: 0 0, 30px 30px;
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 容器 */
        #app { width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; }

        .page {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            position: relative;
            animation: bounceIn 0.6s ease-out;
        }

        /* 返回首頁按鈕 */
        .home-btn {
            position: absolute;
            top: 25px;
            left: 25px;
            width: 60px;
            height: 60px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            color: var(--secondary);
            text-decoration: none;
            box-shadow: 0 6px 0 #bdd9e3;
            transition: all 0.2s;
            z-index: 100;
        }
        .home-btn:active { transform: translateY(4px); box-shadow: 0 2px 0 #bdd9e3; }

        /* 圖片樣式 */
        .content-img {
            max-width: 75%;
            max-height: 55vh;
            border: 10px solid white;
            border-radius: 40px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.1);
            cursor: pointer;
            background-color: white;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .content-img:active { transform: scale(0.95); }

        /* 按鈕列 */
        .nav-buttons { margin-top: 40px; display: flex; gap: 30px; }

        .btn {
            background-color: var(--secondary);
            color: white;
            border: none;
            border-radius: 30px;
            padding: 15px 40px;
            font-size: 2.2rem;
            cursor: pointer;
            box-shadow: 0 8px 0 #58a9c9;
            transition: all 0.2s;
        }
        .btn:active { transform: translateY(6px); box-shadow: 0 2px 0 #58a9c9; }
        .btn-next { background-color: var(--primary); box-shadow: 0 8px 0 #d66498; }

        /* 第四頁互動佈局 */
        .layout-row { display: flex; align-items: center; gap: 50px; }
        .vertical-buttons { display: flex; flex-direction: column; gap: 25px; }
        .img-btn {
            width: 200px; height: 130px;
            object-fit: contain;
            cursor: pointer;
            border: 8px solid white;
            border-radius: 30px;
            background: white;
            box-shadow: 0 8px 15px rgba(0,0,0,0.1);
            transition: transform 0.2s;
        }
        .img-btn:active { transform: scale(0.9); }

        @keyframes bounceIn {
            0% { opacity: 0; transform: scale(0.9); }
            100% { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>

    <div id="app">
        </div>
<script>
    // --- 1. 資料陣列 ---
const pagesData = [
    { type: "cover", image: "img/1.png" },
    { type: "standard", image: "img/1.png", audioText: "Do you like ice cream?" },
    { type: "standard", image: "img/1-1.png", audioText: "Yes, I do." },
    { type: "standard", image: "img/2.png", audioText: "Do you like snake?" },
    { type: "standard", image: "img/2-1.png", audioText: "No, I don't." },
    {
        type: "choice",
        mainImage: "img/1.png",
        audioText: "Do you like ice cream?",
        choices: [
            { img: "img/yes.png", audio: "Yes, I do." },
            { img: "img/no.png", audio: "No, I don't." }
        ]
    },
    {
        type: "choice",
        mainImage: "img/3.jpeg",
        audioText: "Do you like blue?",
        choices: [
            { img: "img/yes.png", audio: "Yes, I do." },
            { img: "img/no.png", audio: "No, I don't." }
        ]
    },
    {
        type: "choice",
        mainImage: "img/4.jpeg",
        audioText: "Do you like watermelon?",
        choices: [
            { img: "img/yes.png", audio: "Yes, I do." },
            { img: "img/no.png", audio: "No, I don't." }
        ]
    },
    {
        type: "choice",
        mainImage: "img/5.jpeg",
        audioText: "Do you like cat?",
        choices: [
            { img: "img/yes.png", audio: "Yes, I do." },
            { img: "img/no.png", audio: "No, I don't." }
        ]
    },
    {
        type: "choice",
        mainImage: "img/6.jpeg",
        audioText: "Do you like dog?",
        choices: [
            { img: "img/yes.png", audio: "Yes, I do." },
            { img: "img/no.png", audio: "No, I don't." }
        ]
    }
];

// --- 2. 狀態管理 ---
let currentIndex = 0;
const app = document.getElementById('app');
const homeUrl = "https://yale-learning-go.github.io/english/";

// --- 3. 渲染邏輯 ---
function renderPage() {
    const data = pagesData[currentIndex];
    let contentHtml = "";
    const homeBtn = `<a href="${homeUrl}" class="home-btn"><i class="fas fa-home"></i></a>`;

    if (data.type === "cover") {
        contentHtml = `
            <div class="page">
                ${homeBtn}
                <img src="${data.image}" class="content-img">
                <div class="nav-buttons">
                    <button class="btn btn-next" onclick="nextPage()"><i class="fas fa-play"></i></button>
                </div>
            </div>
        `;
    } else if (data.type === "standard") {
        const safeText = data.audioText.replace(/'/g, "\\'");
        contentHtml = `
            <div class="page">
                ${homeBtn}
                <img src="${data.image}" class="content-img" onclick="speak('${safeText}')">
                <div class="nav-buttons">
                    <button class="btn" onclick="prevPage()"><i class="fas fa-arrow-left"></i></button>
                    ${currentIndex < pagesData.length - 1 ? `<button class="btn btn-next" onclick="nextPage()"><i class="fas fa-arrow-right"></i></button>` : ''}
                </div>
            </div>
        `;
    } else if (data.type === "choice") {
        const safeMainAudio = (data.audioText || "").replace(/'/g, "\\'");
        const choiceBtns = data.choices.map(c => {
            const safeChoiceAudio = c.audio.replace(/'/g, "\\'");
            return `<img src="${c.img}" class="img-btn" onclick="speak('${safeChoiceAudio}')">`;
        }).join('');

        contentHtml = `
            <div class="page">
                ${homeBtn}
                <div class="layout-row">
                    <img src="${data.mainImage}" class="content-img" onclick="speak('${safeMainAudio}')">
                    <div class="vertical-buttons">${choiceBtns}</div>
                </div>
                <div class="nav-buttons">
                    <button class="btn" onclick="prevPage()"><i class="fas fa-arrow-left"></i></button>
                    ${currentIndex < pagesData.length - 1 ? `<button class="btn btn-next" onclick="nextPage()"><i class="fas fa-arrow-right"></i></button>` : ''}
                </div>
            </div>
        `;
    }

    app.innerHTML = contentHtml;

    // --- 自動播放邏輯 ---
    // 只要當前頁面有音檔文字，就自動播放
    if (data.audioText) {
        speak(data.audioText);
    }
}

// --- 4. 功能函數 ---
function nextPage() {
    if (currentIndex < pagesData.length - 1) {
        currentIndex++;
        renderPage();
    }
}

function prevPage() {
    if (currentIndex > 0) {
        currentIndex--;
        renderPage();
    }
}

function speak(text) {
    // 先停止目前正在播放的語音，避免重疊
    window.speechSynthesis.cancel();
    
    const utterance = new SpeechSynthesisUtterance(text);
    utterance.lang = 'en-US';
    utterance.rate = 0.8;
    utterance.pitch = 1.3;
    window.speechSynthesis.speak(utterance);
}

// 初始化第一頁
renderPage();
</script>
</body>
</html>
