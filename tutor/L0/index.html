<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultraman English Learning</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Noto+Sans+TC:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #FF7EB9;      /* 粉紅 */
            --secondary: #70D6FF;    /* 天藍 */
            --accent: #FFD670;       /* 奶油黃 */
            --bg-color: #E8F9FF;     /* 淺藍底 */
            --text-dark: #4A4A4A;
        }

        body {
            margin: 0;
            font-family: 'Fredoka One', 'Noto Sans TC', sans-serif;
            background-color: var(--bg-color);
            background-image: radial-gradient(#fff 15%, transparent 16%), radial-gradient(#fff 15%, transparent 16%);
            background-size: 60px 60px;
            background-position: 0 0, 30px 30px; /* 裝飾性的圓點背景 */
            color: var(--text-dark);
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 頁面容器 */
        .page {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            padding: 20px;
            box-sizing: border-box;
            position: relative;
        }

        .page.active { display: flex; animation: bounceIn 0.6s ease-out; }

        /* 返回首頁按鈕：設計成圓形懸浮感 */
        .home-btn {
            position: absolute;
            top: 25px;
            left: 25px;
            width: 60px;
            height: 60px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            color: var(--secondary);
            text-decoration: none;
            box-shadow: 0 6px 0 #bdd9e3;
            transition: all 0.2s;
            z-index: 100;
        }

        .home-btn:active { transform: translateY(4px); box-shadow: 0 2px 0 #bdd9e3; }

        /* 主要圖片樣式：像卡片一樣 */
        .content-img {
            max-width: 75%;
            max-height: 55vh;
            border: 10px solid white;
            border-radius: 40px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.1);
            cursor: pointer;
            background-color: white;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .content-img:hover { transform: scale(1.02) rotate(1deg); }

        /* 控制按鈕 */
        .nav-buttons {
            margin-top: 40px;
            display: flex;
            gap: 30px;
        }

        .btn {
            background-color: var(--secondary);
            color: white;
            border: none;
            border-radius: 30px;
            padding: 15px 40px;
            font-size: 2.2rem;
            cursor: pointer;
            box-shadow: 0 8px 0 #58a9c9;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn:hover { background-color: #85e0ff; }
        .btn:active { transform: translateY(6px); box-shadow: 0 2px 0 #58a9c9; }

        .btn-next { background-color: var(--primary); box-shadow: 0 8px 0 #d66498; }
        .btn-next:hover { background-color: #ff9ecb; }
        .btn-next:active { box-shadow: 0 2px 0 #d66498; }

        /* 第四頁：Yes/No 佈局 */
        .layout-row {
            display: flex;
            align-items: center;
            gap: 50px;
        }

        .vertical-buttons {
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .img-btn {
            width: 240px;
            height: 140px;
            object-fit: contain;
            cursor: pointer;
            border: 8px solid white;
            border-radius: 30px;
            background: white;
            box-shadow: 0 8px 15px rgba(0,0,0,0.1);
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .img-btn:hover { transform: scale(1.1); box-shadow: 0 12px 20px rgba(0,0,0,0.15); }
        .img-btn:active { transform: scale(0.9); }

        /* 進場動畫 */
        @keyframes bounceIn {
            0% { opacity: 0; transform: scale(0.9); }
            60% { transform: scale(1.05); }
            100% { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>

    <a href="https://yale-learning-go.github.io/english/" class="home-btn">
        <i class="fas fa-home"></i>
    </a>

    <div id="page1" class="page active">
        <img src="cover.png" alt="Cover" class="content-img">
        <div class="nav-buttons">
            <button class="btn btn-next" onclick="nextPage()">
                <i class="fas fa-play"></i>
            </button>
        </div>
    </div>

    <div id="page2" class="page">
        <img src="img/1.png" alt="1" class="content-img" onclick="speak('Do you like ice cream?')">
        <div class="nav-buttons">
            <button class="btn" onclick="prevPage()">
                <i class="fas fa-arrow-left"></i>
            </button>
            <button class="btn btn-next" onclick="nextPage()">
                <i class="fas fa-arrow-right"></i>
            </button>
        </div>
    </div>

    <div id="page3" class="page">
        <img src="img/1-1.png" alt="1-1" class="content-img" onclick="speak('Yes, I do.')">
        <div class="nav-buttons">
            <button class="btn" onclick="prevPage()">
                <i class="fas fa-arrow-left"></i>
            </button>
            <button class="btn btn-next" onclick="nextPage()">
                <i class="fas fa-arrow-right"></i>
            </button>
        </div>
    </div>

    <div id="page4" class="page">
        <img src="img/2.png" alt="1" class="content-img" onclick="speak('Do you like snake?')">
        <div class="nav-buttons">
            <button class="btn" onclick="prevPage()">
                <i class="fas fa-arrow-left"></i>
            </button>
            <button class="btn btn-next" onclick="nextPage()">
                <i class="fas fa-arrow-right"></i>
            </button>
        </div>
    </div>

    <div id="page5" class="page">
        <img src="img/2-1.png" alt="1-1" class="content-img" onclick="speak('No, I don\'t.')">
        <div class="nav-buttons">
            <button class="btn" onclick="prevPage()">
                <i class="fas fa-arrow-left"></i>
            </button>
            <button class="btn btn-next" onclick="nextPage()">
                <i class="fas fa-arrow-right"></i>
            </button>
        </div>
    </div>

    <div id="page6" class="page">
        <div class="layout-row">
            <img src="img/1.png" alt="1" class="content-img">
            <div class="vertical-buttons">
                <img src="img/yes.png" alt="Yes" class="img-btn" onclick="speak('Yes, I do!')">
                <img src="img/no.png" alt="No" class="img-btn" onclick="speak('No, I don\'t.')">
            </div>
        </div>
        <div class="nav-buttons">
            <button class="btn" onclick="prevPage()">
                <i class="fas fa-arrow-left"></i>
            </button>
        </div>
    </div>

    <script>
        let currentStep = 1;
        const totalPages = 4;

        function updatePages() {
            document.querySelectorAll('.page').forEach(page => {
                page.classList.remove('active');
            });
            document.getElementById(`page${currentStep}`).classList.add('active');
        }

        function nextPage() {
            if (currentStep < totalPages) {
                currentStep++;
                updatePages();
            }
        }

        function prevPage() {
            if (currentStep > 1) {
                currentStep--;
                updatePages();
            }
        }

        function speak(text) {
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'en-US';
            utterance.rate = 0.8; // 稍微放慢，讓小孩聽得更清楚
            utterance.pitch = 1.3; // 提高音調，更有精神、更像卡通聲
            window.speechSynthesis.speak(utterance);
        }
    </script>
</body>
</html>
